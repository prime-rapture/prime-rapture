<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Подарок от Prime & Rapture</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #111;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: url('avatar.jpg') center/cover no-repeat;
      filter: brightness(0.28) blur(2px);
      transform: scale(1.04);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 14px;
    }

    .popup {
      width: 100%;
      max-width: 560px;
      max-height: 96vh;
      overflow: hidden;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.55);
      animation: show 0.32s ease;
      position: relative;
    }

    @keyframes show {
      from { opacity: 0; transform: scale(0.96) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .hero {
      width: 100%;
      height: 235px;
      border-radius: 24px 24px 0 0;
      background: url('avatar.jpg') center 18%/cover no-repeat;
      background-color: #e8e8e8;
    }

    .close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(0,0,0,0.78);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      text-decoration: none;
      line-height: 1;
      z-index: 2;
    }

    .content {
      padding: 26px 34px 30px;
      text-align: center;
    }

    .pretitle {
      font-size: 18px;
      color: #777;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .brand {
      font-size: 44px;
      line-height: 0.98;
      font-weight: 950;
      color: #050505;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .line {
      height: 1px;
      background: #dedede;
      margin-bottom: 20px;
    }

    .benefits {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .benefit {
      text-align: center;
      color: #222;
      font-size: 13px;
      font-weight: 900;
      line-height: 1.2;
      text-transform: uppercase;
    }

    .benefit-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 8px;
      border-radius: 50%;
      background: #050505;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 23px;
    }

    .offer-box {
      background: #f3f3f3;
      border-radius: 16px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 18px;
      text-align: left;
    }

    .offer-icon {
      min-width: 54px;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: #050505;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .offer-title {
      font-size: 19px;
      font-weight: 950;
      text-transform: uppercase;
      color: #050505;
      margin-bottom: 4px;
    }

    .offer-text {
      font-size: 15px;
      line-height: 1.28;
      color: #333;
      text-transform: uppercase;
      font-weight: 700;
    }

    .avatars {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
    }

    .avatars img {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid white;
      margin-left: -8px;
      object-fit: cover;
    }

    .subs {
      margin-left: 12px;
      color: #555;
      font-size: 15px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: #050505;
      color: white;
      text-decoration: none;
      padding: 18px 18px;
      border-radius: 12px;
      font-size: 22px;
      font-weight: 950;
      text-transform: uppercase;
      transition: 0.2s;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    .btn:hover {
      transform: translateY(-2px);
      background: #1a1a1a;
    }

    .safe {
      margin-top: 14px;
      color: #777;
      font-size: 14px;
      line-height: 1.35;
    }

    @media (max-width: 520px) {
      body { overflow: auto; }
      .overlay { align-items: flex-start; padding: 10px; }
      .popup { border-radius: 20px; max-height: none; }
      .hero { height: 205px; border-radius: 20px 20px 0 0; background-position: center 12%; }
      .content { padding: 22px 18px 24px; }
      .pretitle { font-size: 15px; letter-spacing: 1.5px; }
      .brand { font-size: 34px; }
      .benefit { font-size: 11px; }
      .benefit-icon { width: 42px; height: 42px; font-size: 20px; }
      .offer-box { padding: 14px; }
      .offer-icon { min-width: 46px; width: 46px; height: 46px; font-size: 24px; }
      .offer-title { font-size: 16px; }
      .offer-text { font-size: 13px; }
      .btn { font-size: 18px; padding: 16px 14px; }
      .safe { font-size: 12px; }
      .close { width: 38px; height: 38px; font-size: 25px; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <div class="overlay">
    <div class="popup">
      <a class="close" href="#">×</a>

      <div class="hero"></div>

      <div class="content">
        <div class="pretitle">🎁 Твой подарок от</div>
        <div class="brand">Prime & Rapture</div>

        <div class="line"></div>

        <div class="benefits">
          <div class="benefit">
            <div class="benefit-icon">%</div>
            Эксклюзивная<br>скидка
          </div>
          <div class="benefit">
            <div class="benefit-icon">🎁</div>
            Подарок<br>за подписку
          </div>
          <div class="benefit">
            <div class="benefit-icon">⚡</div>
            Новинки<br>первыми
          </div>
        </div>

        <div class="offer-box">
          <div class="offer-icon">🎁</div>
          <div>
            <div class="offer-title">Подарок для своих</div>
            <div class="offer-text">Подпишись на сообщения и получи закрытый бонус</div>
          </div>
        </div>

        <div class="avatars">
          <img src="https://randomuser.me/api/portraits/women/44.jpg" alt="">
          <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="">
          <img src="https://randomuser.me/api/portraits/men/75.jpg" alt="">
          <div class="subs">Подписчиков: 4807</div>
        </div>

        <a class="btn" href="https://vk.me/prime_rapture_store">
          Получить подарок 🎁
        </a>

        <div class="safe">
          🛡 Никакого спама. Только полезные предложения<br>
          и закрытые скидки для своих.
        </div>
      </div>
    </div>
  </div>

</body>
</html>
