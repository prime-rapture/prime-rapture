<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Подарок от Prime & Rapture</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #111;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: url('avatar.jpg') center/cover no-repeat;
      filter: brightness(0.25) blur(3px);
      transform: scale(1.06);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 14px;
    }

    .popup {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 25px 80px rgba(0,0,0,0.6);
      position: relative;
      animation: show 0.28s ease;
    }

    @keyframes show {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }

    .close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #050505;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      text-decoration: none;
      z-index: 3;
    }

    .hero {
      width: 100%;
      height: 220px;
      background: url('avatar.jpg') center 18% / cover no-repeat;
      background-color: #e5e5e5;
    }

    .content {
      padding: 24px 34px 28px;
      text-align: center;
    }

    .pretitle {
      color: #777;
      font-size: 17px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .brand {
      color: #050505;
      font-size: 42px;
      line-height: 0.96;
      font-weight: 950;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .line {
      height: 1px;
      background: #ddd;
      margin-bottom: 18px;
    }

    .benefits {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .benefit {
      color: #111;
      font-size: 12px;
      line-height: 1.2;
      font-weight: 900;
      text-transform: uppercase;
    }

    .benefit-icon {
      width: 46px;
      height: 46px;
      margin: 0 auto 7px;
      border-radius: 50%;
      background: #050505;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .offer-box {
      background: #f3f3f3;
      border-radius: 16px;
      padding: 15px 17px;
      display: flex;
      align-items: center;
      gap: 13px;
      text-align: left;
      margin-bottom: 18px;
    }

    .offer-icon {
      width: 50px;
      min-width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #050505;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
    }

    .offer-title {
      font-size: 18px;
      font-weight: 950;
      color: #050505;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .offer-text {
      font-size: 14px;
      line-height: 1.25;
      font-weight: 800;
      color: #333;
      text-transform: uppercase;
    }

    .avatars {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 18px;
    }

    .avatars img {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 3px solid #fff;
      margin-left: -8px;
      object-fit: cover;
    }

    .subs {
      margin-left: 12px;
      color: #555;
      font-size: 14px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      background: #050505;
      color: #fff;
      text-decoration: none;
      padding: 17px 16px;
      border-radius: 12px;
      font-size: 21px;
      font-weight: 950;
      text-transform: uppercase;
      transition: 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      background: #1a1a1a;
    }

    .safe {
      margin-top: 12px;
      color: #777;
      font-size: 12px;
      line-height: 1.35;
    }

    @media (max-width: 540px) {
      body { overflow: auto; }
      .overlay { align-items: flex-start; padding: 10px; }
      .popup { max-width: 100%; border-radius: 20px; }
      .hero { height: 190px; background-position: center 15%; }
      .content { padding: 20px 18px 24px; }
      .pretitle { font-size: 14px; }
      .brand { font-size: 34px; }
      .benefit { font-size: 11px; }
      .benefit-icon { width: 42px; height: 42px; font-size: 20px; }
      .offer-title { font-size: 16px; }
      .offer-text { font-size: 12px; }
      .btn { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <div class="overlay">
    <div class="popup">
      <a class="close" href="#">×</a>
      <div class="hero"></div>

      <div class="content">
        <div class="pretitle">🎁 Твой подарок от</div>
        <div class="brand">Prime &amp; Rapture</div>
        <div class="line"></div>

        <div class="benefits">
          <div class="benefit">
            <div class="benefit-icon">%</div>
            Закрытая<br>скидка
          </div>
          <div class="benefit">
            <div class="benefit-icon">🎁</div>
            Подарок<br>за подписку
          </div>
          <div class="benefit">
            <div class="benefit-icon">⚡</div>
            Новинки<br>первыми
          </div>
        </div>

        <div class="offer-box">
          <div class="offer-icon">🎁</div>
          <div>
            <div class="offer-title">Подарок для своих</div>
            <div class="offer-text">Подпишись на сообщения и получи закрытый бонус</div>
          </div>
        </div>

        <div class="avatars">
          <img src="https://randomuser.me/api/portraits/women/44.jpg" alt="">
          <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="">
          <img src="https://randomuser.me/api/portraits/men/75.jpg" alt="">
          <div class="subs">Подписчиков: 4807</div>
        </div>

        <a class="btn" href="https://vk.me/prime_rapture_store">Получить подарок 🎁</a>

        <div class="safe">
          🛡 Никакого спама. Только предложения и закрытые скидки для своих.
        </div>
      </div>
    </div>
  </div>
</body>
</html>
